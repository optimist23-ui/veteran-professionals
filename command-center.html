<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=dvop-dashboard.html">
  <title>DVOP Productivity Command Center</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #627080;
      --paper: #f4f7fb;
      --panel: #ffffff;
      --line: #d7e0ea;
      --teal: #0f766e;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Aptos, "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--teal);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(23, 32, 42, 0.13);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.65rem, 5vw, 2.3rem);
      line-height: 1.08;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 7px;
      color: #fff;
      background: var(--teal);
      font-weight: 850;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("dvop-dashboard.html");
  </script>
</head>
<body>
  <main>
    <h1>Opening DVOP Productivity Command Center</h1>
    <p>If the Command Center does not open automatically, use the button below.</p>
    <a href="dvop-dashboard.html">Open Command Center</a>
  </main>
</body>
</html>
