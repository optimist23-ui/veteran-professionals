<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: Aptos, "Segoe UI", Arial, Helvetica, sans-serif;
      color: #262329;
      background: #f5f7fb;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px clamp(16px, 4vw, 44px);
      border-bottom: 1px solid #d9e0ea;
      background: #fff;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
    }

    a {
      color: #2c6897;
      font-weight: 750;
    }

    main {
      height: calc(100vh - 58px);
      padding: 16px;
    }

    iframe,
    object,
    img {
      width: 100%;
      height: 100%;
      border: 1px solid #d9e0ea;
      border-radius: 8px;
      background: #fff;
    }

    img {
      object-fit: contain;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html">Back to portal</a>
    <h1 id="viewerTitle">Document Viewer</h1>
    <a id="openRaw" href="#" target="_blank" rel="noopener">Open original</a>
  </header>
  <main id="viewer"></main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const file = params.get("file") || "";
    const title = params.get("title") || "Document Viewer";
    document.querySelector("#viewerTitle").textContent = title;
    document.querySelector("#openRaw").href = file;

    const viewer = document.querySelector("#viewer");
    if (/\.(png|jpe?g|gif|webp)$/i.test(file)) {
      viewer.innerHTML = `<img src="${file}" alt="${title}">`;
    } else if (/\.pdf$/i.test(file) || file.startsWith("data:application/pdf")) {
      viewer.innerHTML = `<iframe src="${file}" title="${title}"></iframe>`;
    } else {
      viewer.innerHTML = `<object data="${file}" type="application/pdf"><p>This browser cannot preview this file. Use Open original.</p></object>`;
    }
  </script>
</body>
</html>
