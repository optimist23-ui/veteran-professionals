<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=veteran-job-board.html">
  <title>Veteran Professionals Job Board</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #263a5c;
      --muted: #56515f;
      --paper: #f5f7fb;
      --panel: #ffffff;
      --line: #d9e0ea;
      --green: #0f7865;
      --orange: #d65b36;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Aptos, "Segoe UI", Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 120, 101, 0.1), rgba(214, 91, 54, 0.08)),
        var(--paper);
    }

    main {
      width: min(560px, 100%);
      padding: 28px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--green);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 18px 48px rgba(38, 35, 41, 0.13);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      color: #fff;
      background: var(--ink);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("veteran-job-board.html");
  </script>
</head>
<body>
  <main>
    <h1>Opening Veteran Professionals Job Board</h1>
    <p>If the page does not open automatically, use the button below.</p>
    <a href="veteran-job-board.html">Open Job Board</a>
  </main>
</body>
</html>
